<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - Aqua en Lavaba</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

<div class="login-page d-flex align-items-center justify-content-center">

  <div class="auth-panel row gx-0 shadow-lg">

    <!-- LEFT PANEL (OPTIONAL DESIGN - MATCH LOGIN) -->
    <div class="col-lg-6 d-none d-lg-flex left-panel align-items-center">
      <div class="text-white p-4">
        <h2 class="fw-bold">Create Staff Account</h2>
        <p class="mt-3">
          Register new staff members to manage your Aqua in Lavaba system efficiently and securely.
        </p>
      </div>
    </div>

    <!-- FORM PANEL -->
    <div class="form-panel col-lg-6 col-md-8 col-12 d-flex align-items-center justify-content-center">

      <div class="login-card">

        <!-- BRAND -->
        <div class="brand-block text-center mb-4">
          <h4>Create Account</h4>
          <p class="text-muted">Register a new staff account</p>
        </div>

        <!-- FORM -->
        <div class="form-group mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="Enter full name">
        </div>

        <div class="form-group mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="form-group mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Create password">
        </div>

        <div class="form-group mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" placeholder="Confirm password">
        </div>

        <!-- BUTTON -->
        <button class="btn btn-login w-100 mb-3" onclick="createAccount()">
          Create Account
        </button>

        <!-- FOOTER -->
        <div class="text-center text-muted small">
          Already have an account? <a href="index.html">Login here</a>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
function createAccount() {
  alert('Account creation is ready for backend integration.');
}
</script>

</body>
</html>
