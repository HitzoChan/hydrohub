<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HydroHub Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- TOPBAR -->
   <div id="header-container"></div>

    <!-- TITLE -->
    <div class="mb-4">
      <h4 class="mb-2">Dashboard Overview</h4>
      <p class="text-muted mb-0">Welcome back! Here's what's happening today.</p>
    </div>

    <!-- CARDS -->
    <div class="row g-4 mb-4 justify-content-between">

      <div class="col-md-2">
        <div class="card p-3 shadow-sm">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-receipt text-primary me-2"></i>
            <small>Total Orders Today</small>
          </div>
          <h4 id="totalOrders">--</h4>
        </div>
      </div>

      <div class="col-md-2">
        <div class="card p-3 shadow-sm">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-truck text-success me-2"></i>
            <small>Active Deliveries</small>
          </div>
          <h4 id="activeOrders">--</h4>
        </div>
      </div>

      <div class="col-md-2">
        <div class="card p-3 shadow-sm">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-people text-info me-2"></i>
            <small>Total Customers</small>
          </div>
          <h4 id="totalCustomers">--</h4>
        </div>
      </div>

      <div class="col-md-2">
        <div class="card p-3 shadow-sm">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-cash text-warning me-2"></i>
            <small>Revenue Today</small>
          </div>
          <h4 id="revenue">--</h4>
        </div>
      </div>

      <div class="col-md-2">
        <div class="card p-3 shadow-sm">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-chat-dots text-danger me-2"></i>
            <small>Unread Messages</small>
          </div>
          <h4 id="unreadMessages">--</h4>
        </div>
      </div>

    </div>

    <!-- CHARTS -->
    <div class="row g-4 mb-4">

      <div class="col-md-6">
        <div class="card chart-box">
          <h6>Weekly Sales</h6>
          <canvas id="salesChart"></canvas>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card chart-box">
          <h6>Today's Deliveries</h6>
          <div class="mb-2 text-muted">Completed deliveries today: <strong id="todayDeliveriesCount">0</strong></div>
          <canvas id="deliveryChart"></canvas>
        </div>
      </div>

    </div>

    <!-- TRANSACTIONS -->
    <div class="card p-4 shadow-sm">
      <h6 class="mb-3">Recent Transactions</h6>
      <div id="recentTransactions"></div>
    </div>
    
    <div id="footer-container"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config/supabase.js"></script>
<script src="assets/js/supabaseClient.js"></script>
<script src="assets/js/dashboard.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
