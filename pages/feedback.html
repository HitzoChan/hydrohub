<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback - HydroHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/feedback.css">
</head>

<body>

<div class="d-flex">

  <div id="sidebar-container"></div>

  <div class="main-content bg-light p-4 w-100">

    <div class="container-fluid" style="max-width: 1200px;">

      <div id="header-container"></div>

      <!-- HEADER -->
      <div class="mb-4">
        <h4 class="fw-semibold">Feedback & Reviews</h4>
        <p class="text-muted">Customer ratings and comments</p>
      </div>

      <!-- STATS -->
      <div class="row g-3 mb-4">

        <div class="col-md-3">
          <div class="stat-card">
            <small>Average Rating</small>
            <h5 id="avgRating">4.6</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="stat-card">
            <small>Total Reviews</small>
            <h5 id="totalReviews">200</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="stat-card">
            <small>5-Star Reviews</small>
            <h5>72.5%</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="stat-card">
            <small>Satisfaction</small>
            <h5>95%</h5>
          </div>
        </div>

      </div>

      <div class="row g-3">

        <!-- LEFT: RATING -->
        <div class="col-md-4">
          <div class="card p-3">

            <h6>Rating Distribution</h6>

            <div class="text-center mb-3">
              <h2 id="avgDisplay">4.6</h2>
              <div class="stars">★★★★★</div>
              <small class="text-muted">Based on 200 reviews</small>
            </div>

            <div id="ratingBars"></div>

          </div>
        </div>

        <!-- RIGHT: REVIEWS -->
        <div class="col-md-8">
          <div class="card p-3">

            <h6 class="mb-3">Recent Reviews</h6>

            <div id="reviewsList"></div>

          </div>
        </div>

      </div>

      <div id="footer-container"></div>

    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/feedback.js"></script>

</body>
</html>
