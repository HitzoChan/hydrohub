<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employees - HydroHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/employees.css">
</head>

<body>

<div class="d-flex">

  <div id="sidebar-container"></div>

  <div class="main-content bg-light p-4 w-100">

    <div class="container-fluid" style="max-width: 1200px;">

      <div id="header-container"></div>

      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-semibold">Employee Management</h4>
          <p class="text-muted mb-0">Manage delivery personnel and staff accounts</p>
        </div>

        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#employeeModal">
          + Add Employee
        </button>
      </div>

      <!-- STATS -->
      <div class="row g-3 mb-4">

        <div class="col-md-3"><div class="stat-card">Total Employees <h5 id="totalEmp">0</h5></div></div>
        <div class="col-md-3"><div class="stat-card">Active Drivers <h5 id="drivers">0</h5></div></div>
        <div class="col-md-3"><div class="stat-card">Active Staff <h5 id="staff">0</h5></div></div>
        <div class="col-md-3"><div class="stat-card">Inactive <h5 id="inactive">0</h5></div></div>

      </div>

      <!-- TABLE -->
      <div class="card p-3">

        <h6 class="mb-3">All Employees</h6>

        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Role</th>
              <th>Contact</th>
              <th>Status</th>
              <th>Access Code</th>
              <th>Code Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="employeeTable"></tbody>

        </table>

      </div>

      <div id="footer-container"></div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="employeeModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add Employee</h5>
      </div>

      <div class="modal-body">

        <input id="empName" class="form-control mb-2" placeholder="Full Name">
        <input id="empContact" class="form-control mb-2" placeholder="Contact Number">

        <select id="empRole" class="form-control mb-2">
          <option value="Driver">Driver</option>
          <option value="Staff">Staff</option>
        </select>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-dark" onclick="addEmployee()">Save</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/employees.js"></script>

</body>
</html>
