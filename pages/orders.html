<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders - HydroHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/orders.css">
</head>
<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main-content bg-light">

    <!-- TOPBAR -->
  <div id="header-container"></div>

    <!-- TITLE -->
    <h4>Order & Payment Management</h4>
    <p class="text-muted">Manage orders and verify Cash on Delivery payments</p>

    <!-- STATS -->
    <div class="row g-3 mb-4">

      <div class="col-md-3">
        <div class="stat-card blue">
          <span>Total Orders</span>
          <h3 id="totalOrdersStat">0</h3>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card yellow">
          <span>Pending</span>
          <h3 id="pendingOrdersStat">0</h3>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card purple">
          <span>On the Way</span>
          <h3 id="onTheWayOrdersStat">0</h3>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-card green">
          <span>Delivered</span>
          <h3 id="deliveredOrdersStat">0</h3>
        </div>
      </div>

    </div>

    <!-- SEARCH -->
    <div class="card p-3 mb-4">
      <div class="d-flex gap-3 flex-wrap">
        <input class="form-control flex-grow-1" placeholder="Search by order ID or customer name...">

        <select id="statusFilter" class="form-select w-auto">
          <option value="all">All Orders</option>
          <option value="pending">Pending</option>
          <option value="on_the_way">On the Way</option>
          <option value="delivered">Delivered</option>
          <option value="scheduled">Scheduled</option>
        </select>

        <select id="deliveryTypeFilter" class="form-select w-auto">
          <option value="all">All Delivery Types</option>
          <option value="now">Deliver Now</option>
          <option value="scheduled">Scheduled</option>
        </select>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
      <h6 id="ordersTableTitle">All Orders (0)</h6>

      <div class="table-responsive">
        <table class="table align-middle">

          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Containers</th>
              <th>Amount</th>
              <th>Exchange</th>
              <th>Delivery Type</th>
              <th>Driver</th>
              <th>Status</th>
              <th>Created At</th>
            </tr>
          </thead>

          <tbody id="ordersTable"></tbody>

        </table>
      </div>

    </div>
    
    <div id="footer-container"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config/supabase.js"></script>
<script src="../assets/js/supabaseClient.js"></script>
<script src="../assets/js/orders.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
