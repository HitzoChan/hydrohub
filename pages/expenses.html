<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expenses - HydroHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/expenses.css">
</head>

<body>

<div class="d-flex">

  <div id="sidebar-container"></div>

  <div class="main-content bg-light p-4 w-100">

    <div class="container-fluid" style="max-width: 1100px;">

      <div id="header-container"></div>

      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-semibold">Expense Management</h4>
          <p class="text-muted mb-0">Track operational costs (fuel, repairs, etc.)</p>
        </div>

        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#expenseModal">
          + Add Expense
        </button>
      </div>

      <!-- TABLE -->
      <div class="card p-3">

        <h6 class="mb-3">Expense Records</h6>

        <table class="table align-middle">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Driver</th>
              <th>Notes</th>
            </tr>
          </thead>

          <tbody id="expenseTable"></tbody>

        </table>

      </div>

      <div id="footer-container"></div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="expenseModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add Expense</h5>
      </div>

      <div class="modal-body">

        <input id="expDate" type="date" class="form-control mb-2">

        <!-- FLEXIBLE TYPE INPUT -->
        <input id="expType" type="text" class="form-control mb-2" placeholder="Type (Fuel, Tire, Repair...)">

        <input id="expAmount" type="number" class="form-control mb-2" placeholder="Amount">

        <input id="expDriver" type="text" class="form-control mb-2" placeholder="Driver (optional)">

        <textarea id="expNotes" class="form-control" placeholder="Notes"></textarea>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-dark" onclick="addExpense()">Save</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/expenses.js"></script>

</body>
</html>
