<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers - HydroHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/customers.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main-content bg-light">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- TITLE + ACTION -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="fw-semibold">Customer Management</h4>
        <p class="text-muted mb-0">Manage and view all customer information</p>
      </div>

      <button class="btn btn-dark">
        <i class="bi bi-download me-1"></i> Export List
      </button>
    </div>

    <!-- SEARCH + FILTER -->
    <div class="card p-3 mb-4 search-card">
      <div class="d-flex align-items-center gap-3">

        <div class="search-input flex-grow-1">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search by name, phone, or email...">
        </div>

        <select class="form-select w-auto">
          <option>All Customers</option>
        </select>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3">

      <h6 class="mb-3">All Customers (6)</h6>

      <div class="table-responsive">
        <table class="table align-middle custom-table">

          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Address</th>
              <th>Orders</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody id="customersTable">
          </tbody>

        </table>
      </div>

    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>

  </div>

</div>

<script src="../config/supabase.js"></script>
<script src="../assets/js/supabaseClient.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/customers.js"></script>
</body>
</html>
