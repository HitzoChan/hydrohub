<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deliveries - HydroHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/deliveries.css">
</head>
<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <div class="main-content bg-light">

    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- TITLE + BUTTON -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="fw-semibold">Delivery Management</h4>
        <p class="text-muted mb-0">Track and manage all deliveries</p>
      </div>

      <button id="assignDeliveryBtn" class="btn btn-dark" type="button">
        <i class="bi bi-truck me-1"></i> Assign New Delivery
      </button>
    </div>

    <!-- STATS -->
    <div class="row g-3 mb-4">

      <div class="col-md-3">
        <div class="stat-box blue">
          <i class="bi bi-truck"></i>
          <div>
            <small>In Transit</small>
            <h4 id="inTransitCount">0</h4>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-box green">
          <i class="bi bi-truck"></i>
          <div>
            <small>Delivered</small>
            <h4 id="deliveredCount">0</h4>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-box orange">
          <i class="bi bi-truck"></i>
          <div>
            <small>Pending</small>
            <h4 id="pendingCount">0</h4>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="stat-box purple">
          <i class="bi bi-person"></i>
          <div>
            <small>Active Drivers</small>
            <h4 id="activeDriversCount">0</h4>
          </div>
        </div>
      </div>

    </div>

    <!-- SEARCH -->
    <div class="card p-3 mb-4">
      <div class="d-flex gap-3 flex-wrap">

        <div class="search-input flex-grow-1">
          <i class="bi bi-search"></i>
          <input id="deliverySearch" type="text" placeholder="Search by customer, driver, or order ID...">
        </div>

        <select id="deliveryStatusFilter" class="form-select w-auto">
          <option value="all">All Deliveries</option>
          <option value="pending">Pending</option>
          <option value="assigned">Assigned</option>
          <option value="in_transit">In Transit</option>
          <option value="delivered">Delivered</option>
        </select>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3">

      <h6 id="deliveriesTitle" class="mb-3">All Deliveries (0)</h6>

      <div class="table-responsive">
        <table class="table align-middle deliveries-table">

          <thead>
            <tr>
              <th>Delivery ID</th>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Driver</th>
              <th>Address</th>
              <th>Schedule</th>
              <th>ETA</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody id="deliveriesTableBody"></tbody>

        </table>
      </div>

    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>

  </div>

</div>

<div id="assignModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:1050;">
  <div style="background:#fff;padding:20px; max-width:420px; margin:120px auto; border-radius:10px;">
    <h3>Assign Delivery</h3>

    <label for="orderSelect">Order:</label>
    <select id="orderSelect" name="order" style="width:100%; margin-top:6px;"></select>

    <br><br>

    <label for="driverSelect">Driver:</label>
    <select id="driverSelect" name="driver" style="width:100%; margin-top:6px;"></select>

    <br><br>

    <button type="button" onclick="assignDelivery()">Assign</button>
    <button type="button" onclick="closeAssignModal()">Cancel</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config/supabase.js"></script>
<script src="../assets/js/supabaseClient.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/deliveries.js"></script>
</body>
</html>
